name: Development Environment Backend CI/CD

on:
  workflow_dispatch:
  push:
    branches: [development]
    paths:
      - 'projects/HRManager/src/HrManager.Api/**'
      - 'projects/HRManager/src/HrManager.Application/**'
      - 'projects/HRManager/src/HrManager.Domain/**'
      - 'projects/HRManager/src/HrManager.Infrastructure/**'

env:
  DOTNET_VERSION: '9.x'
  SOLUTION_PATH: 'projects/HRManager/HRManager.sln'
  RESOURCE_GROUP_DEV: hrmanager-dev-rg
  WEBAPP_NAME_DEV: hrmanager-dev-api

jobs:
  build-backend-dev:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}
    
    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

  test-backend-dev:
    name: Test
    runs-on: ubuntu-latest
    needs: build-backend-dev
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}
    
    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore
    
    - name: Run tests
      run: dotnet test ${{ env.SOLUTION_PATH }} --no-build --configuration Release
      continue-on-error: true

  deploy-backend-dev:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test-backend-dev
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ fromJson(secrets.ACR_CREDENTIALS_DEV).loginServer }}
        username: ${{ fromJson(secrets.ACR_CREDENTIALS_DEV).username }}
        password: ${{ fromJson(secrets.ACR_CREDENTIALS_DEV).password }}

    - name: Build and push Docker image
      id: build-image
      run: |
        IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)
        IMAGE_NAME="${{ fromJson(secrets.ACR_CREDENTIALS_DEV).loginServer }}/hrmanagerapi"
        docker build -t ${IMAGE_NAME}:${IMAGE_TAG} -t ${IMAGE_NAME}:latest -f projects/HRManager/src/HrManager.Api/Dockerfile .
        docker push ${IMAGE_NAME}:${IMAGE_TAG}
        docker push ${IMAGE_NAME}:latest
        echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
        echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS_DEV }}

    - name: Deploy to Azure Container Apps
      run: |
        az containerapp update \
          --name ${{ env.WEBAPP_NAME_DEV }} \
          --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
          --image ${{ steps.build-image.outputs.image_name }}:${{ steps.build-image.outputs.image_tag }} \
          --revision-suffix ${{ steps.build-image.outputs.image_tag }} \
          --set-env-vars \
            ASPNETCORE_ENVIRONMENT=Development \
            ASPNETCORE_HTTP_PORTS=5000 \
            "ConnectionStrings__Database=${{ secrets.DB_CONNECTION_STRING_DEV }}"

    - name: Deployment Summary
      run: |
        echo "### Backend API Deployed Successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment:** Development" >> $GITHUB_STEP_SUMMARY
        echo "- **Container App:** ${{ env.WEBAPP_NAME_DEV }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Resource Group:** ${{ env.RESOURCE_GROUP_DEV }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Image:** hrmanagerapi:${{ steps.build-image.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
