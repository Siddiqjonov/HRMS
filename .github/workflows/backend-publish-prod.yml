name: Production Backend — Deploy to Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'projects/HRManager/src/HrManager.Api/**'
      - 'projects/HRManager/src/HrManager.Application/**'
      - 'projects/HRManager/src/HrManager.Domain/**'
      - 'projects/HRManager/src/HrManager.Infrastructure/**'
      - 'projects/HRManager/tests/**'
      - '.github/workflows/backend-publish-prod.yml'

env:
  PROJECT_ID: hrmanager-c32f0
  REGION: europe-west1
  SERVICE_NAME: hr-manager-api
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: hr-manager
  IMAGE: europe-west1-docker.pkg.dev/hrmanager-c32f0/hr-manager/hr-manager-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0"
          cache: true
          cache-dependency-path: 'projects/HRManager/**/*.csproj'

      - name: Restore and build
        run: dotnet build projects/HRManager/src/HrManager.Api/HrManager.Api.csproj --configuration Release

      - name: Run unit tests
        run: dotnet test projects/HRManager/HRManager.sln --configuration Release --verbosity minimal

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required GCP APIs
        run: |
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com \
            --project=${{ env.PROJECT_ID }} --quiet 2>/dev/null || echo "APIs already enabled or permission denied (non-fatal)"

      - name: Create Artifact Registry repository (if needed)
        run: |
          gcloud artifacts repositories create ${{ env.REPO }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet 2>/dev/null || echo "Repository already exists"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          file: projects/HRManager/src/HrManager.Api/Dockerfile
          context: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Keycloak Cloud Run URL
        id: keycloak
        run: |
          KC_URL=$(gcloud run services describe hr-keycloak \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [ -z "$KC_URL" ]; then
            echo "WARNING: Keycloak service not found. Deploy keycloak-setup-prod.yml first."
            KC_URL="https://keycloak-not-deployed-yet.run.app"
          fi
          echo "url=${KC_URL}" >> $GITHUB_OUTPUT
          echo "Keycloak URL: ${KC_URL}"

      - name: Store Firebase SA key in Secret Manager
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' | \
            gcloud secrets create firebase-sa-key --data-file=- \
              --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' | \
            gcloud secrets versions add firebase-sa-key --data-file=- \
              --project=${{ env.PROJECT_ID }}
          echo "Secret stored successfully"

      - name: Store DB connection string in Secret Manager
        run: |
          printf '%s' '${{ secrets.DATABASE_CONNECTION_STRING_PROD }}' | \
            gcloud secrets create db-connection-string --data-file=- \
              --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          printf '%s' '${{ secrets.DATABASE_CONNECTION_STRING_PROD }}' | \
            gcloud secrets versions add db-connection-string --data-file=- \
              --project=${{ env.PROJECT_ID }}
          echo "DB secret stored successfully"

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --port=5000 \
            --cpu=1 \
            --memory=1Gi \
            --min-instances=0 \
            --max-instances=3 \
            --set-secrets="FirebaseStorage__ServiceAccountKeyJson=firebase-sa-key:latest,ConnectionStrings__Database=db-connection-string:latest" \
            --set-env-vars="ASPNETCORE_ENVIRONMENT=Production" \
            --update-env-vars="ASPNETCORE_HTTP_PORTS=5000" \
            --update-env-vars="Keycloak__MetadataAddress=${{ steps.keycloak.outputs.url }}/realms/hr-manager/.well-known/openid-configuration" \
            --update-env-vars="Keycloak__ValidIssuer=${{ steps.keycloak.outputs.url }}/realms/hr-manager" \
            --update-env-vars="Keycloak__Audience=account" \
            --update-env-vars="Cors__AllowedOrigins__0=https://hrmanager-c32f0.web.app" \
            --update-env-vars="Cors__AllowedOrigins__1=https://hrmanager-c32f0.firebaseapp.com" \
            --update-env-vars="Cors__AllowedOrigins__2=http://localhost" \
            --update-env-vars="Cors__AllowedOrigins__3=http://localhost:4200"

      - name: Deployment Summary
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "### Backend Deployed to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${URL}" >> $GITHUB_STEP_SUMMARY
          echo "**Keycloak:** ${{ steps.keycloak.outputs.url }}" >> $GITHUB_STEP_SUMMARY
