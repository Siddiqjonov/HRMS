name:  Production Environment Frontend CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'projects/HRManager/src/Hr.Manager.Web/**'
      - '.github/workflows/frontend-deploy-prod.yml'

env:
  AZURE_CONTAINER_REGISTRY: hrmanager
  CONTAINER_APP_NAME: hr-manager-frontend-prod
  RESOURCE_GROUP: hr-manager

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'projects/HRManager/src/Hr.Manager.Web/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: projects/HRManager/src/Hr.Manager.Web

      - name: Build Angular application
        run: npm run build -- --configuration production
        working-directory: projects/HRManager/src/Hr.Manager.Web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME_PROD }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD_PROD }}

      - name: Build and push container image to ACR
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_APP_NAME }}:${{ github.sha }}
            ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_APP_NAME }}:latest
          file: projects/HRManager/src/Hr.Manager.Web/Dockerfile
          context: projects/HRManager/src/Hr.Manager.Web
          build-args: |
            CONFIGURATION=production
          cache-from: type=registry,ref=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_APP_NAME }}:cache
          cache-to: type=registry,ref=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_APP_NAME }}:cache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_APP_NAME }}:${{ github.sha }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}

