name: Production Frontend — Deploy to Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'projects/HRManager/src/Hr.Manager.Web/**'
      - '.github/workflows/frontend-deploy-prod.yml'

env:
  PROJECT_ID: hrmanager-c32f0
  SITE_ID: hr-manager-uz
  REGION: europe-west1
  ANGULAR_DIR: projects/HRManager/src/Hr.Manager.Web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Cloud Run URLs
        id: urls
        run: |
          KC_URL=$(gcloud run services describe hr-keycloak \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [ -z "$KC_URL" ]; then
            echo "ERROR: Keycloak service not found. Run keycloak-setup-prod.yml first."
            exit 1
          fi
          BACKEND_URL=$(gcloud run services describe hr-manager-api \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [ -z "$BACKEND_URL" ]; then
            echo "ERROR: Backend service not found. Run backend-publish-prod.yml first."
            exit 1
          fi
          echo "keycloak_url=${KC_URL}" >> $GITHUB_OUTPUT
          echo "backend_url=${BACKEND_URL}" >> $GITHUB_OUTPUT
          echo "Keycloak URL: ${KC_URL}"
          echo "Backend URL: ${BACKEND_URL}"

      - name: Inject URLs into environment.ts
        run: |
          AUTHORITY="${{ steps.urls.outputs.keycloak_url }}/realms/hr-manager"
          BACKEND="${{ steps.urls.outputs.backend_url }}"
          sed -i "s|KEYCLOAK_AUTHORITY_PLACEHOLDER|${AUTHORITY}|g" \
            ${{ env.ANGULAR_DIR }}/src/app/environments/environment.ts
          sed -i "s|BACKEND_URL_PLACEHOLDER|${BACKEND}|g" \
            ${{ env.ANGULAR_DIR }}/src/app/environments/environment.ts
          echo "environment.ts after substitution:"
          cat ${{ env.ANGULAR_DIR }}/src/app/environments/environment.ts

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '${{ env.ANGULAR_DIR }}/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.ANGULAR_DIR }}

      - name: Build Angular application
        run: npm run build -- --configuration production
        working-directory: ${{ env.ANGULAR_DIR }}

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:${{ env.SITE_ID }} --project ${{ env.PROJECT_ID }}
        working-directory: ${{ env.ANGULAR_DIR }}

      - name: Deployment Summary
        run: |
          echo "### Frontend Deployed to Firebase Hosting" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** https://${{ env.SITE_ID }}.web.app" >> $GITHUB_STEP_SUMMARY
          echo "**Backend URL:** ${{ steps.urls.outputs.backend_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Keycloak Authority:** ${{ steps.urls.outputs.keycloak_url }}/realms/hr-manager" >> $GITHUB_STEP_SUMMARY
