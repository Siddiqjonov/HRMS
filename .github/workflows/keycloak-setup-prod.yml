name: Production Keycloak — Deploy to Cloud Run

on:
  workflow_dispatch:

env:
  PROJECT_ID: hrmanager-c32f0
  REGION: europe-west1
  SERVICE_NAME: hr-keycloak
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: hr-manager
  IMAGE: europe-west1-docker.pkg.dev/hrmanager-c32f0/hr-manager/keycloak

jobs:
  build-and-deploy-keycloak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Keycloak image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.IMAGE }}:latest
          file: projects/HRManager/Dockerfile.keycloak
          context: projects/HRManager

      - name: Deploy Keycloak to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.IMAGE }}:latest
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --cpu=1
            --memory=1Gi
            --min-instances=1
            --max-instances=1
          env_vars: |
            KEYCLOAK_ADMIN=admin
            KEYCLOAK_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
            KC_HTTP_ENABLED=true
            KC_PROXY_HEADERS=xforwarded
            KC_HOSTNAME_STRICT=false
            KC_DB=dev-file

      - name: Get Keycloak URL
        id: keycloak_url
        run: |
          KC_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=${KC_URL}" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          KC_URL=${{ steps.keycloak_url.outputs.url }}
          echo "### Keycloak Deployed to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Keycloak URL:** ${KC_URL}" >> $GITHUB_STEP_SUMMARY
          echo "**Admin Console:** ${KC_URL}/admin" >> $GITHUB_STEP_SUMMARY
          echo "**Realm:** hr-manager" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Open Admin Console and configure the \`hr-manager\` realm" >> $GITHUB_STEP_SUMMARY
          echo "2. Trigger \`backend-publish-prod.yml\` to deploy the API" >> $GITHUB_STEP_SUMMARY
          echo "3. Trigger \`frontend-deploy-prod.yml\` to deploy the Angular app" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note:** Uses embedded H2 database — realm config is preserved between restarts." >> $GITHUB_STEP_SUMMARY
          echo "> For production persistence, add a PostgreSQL DB and redeploy." >> $GITHUB_STEP_SUMMARY
