name: Production Keycloak — Deploy to Cloud Run

on:
  workflow_dispatch:

env:
  PROJECT_ID: hrmanager-c32f0
  REGION: europe-west1
  SERVICE_NAME: hr-keycloak
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: hr-manager
  IMAGE: europe-west1-docker.pkg.dev/hrmanager-c32f0/hr-manager/keycloak

jobs:
  build-and-deploy-keycloak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required GCP APIs
        run: |
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com \
            --project=${{ env.PROJECT_ID }} --quiet

      - name: Create Artifact Registry repository (if needed)
        run: |
          gcloud artifacts repositories create ${{ env.REPO }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet 2>/dev/null || echo "Repository already exists"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Keycloak image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.IMAGE }}:latest
          file: projects/HRManager/Dockerfile.keycloak
          context: projects/HRManager

      - name: Deploy Keycloak to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.IMAGE }}:latest
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --cpu=2
            --memory=4Gi
            --min-instances=1
            --max-instances=1
          env_vars: |
            KEYCLOAK_ADMIN=admin
            KEYCLOAK_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
            KC_HTTP_ENABLED=true
            KC_PROXY_HEADERS=xforwarded
            KC_HOSTNAME_STRICT=false
            KC_DB=postgres
            KC_DB_URL_HOST=${{ fromJson(secrets.POSTGRES_CREDENTIALS).host }}
            KC_DB_URL_PORT=5432
            KC_DB_URL_DATABASE=${{ fromJson(secrets.POSTGRES_CREDENTIALS).database }}
            KC_DB_USERNAME=${{ fromJson(secrets.POSTGRES_CREDENTIALS).user }}
            KC_DB_PASSWORD=${{ fromJson(secrets.POSTGRES_CREDENTIALS).password }}
            KC_DB_URL_PROPERTIES=?sslmode=require

      - name: Get Keycloak URL
        id: keycloak_url
        run: |
          KC_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=${KC_URL}" >> $GITHUB_OUTPUT
          echo "Keycloak deployed at: ${KC_URL}"
          echo "Realm URL: ${KC_URL}/realms/hr-manager"
          echo "Admin Console: ${KC_URL}/admin"

      - name: Deployment Summary
        run: |
          echo "### Keycloak Deployed to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Keycloak URL:** ${{ steps.keycloak_url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Admin Console:** ${{ steps.keycloak_url.outputs.url }}/admin" >> $GITHUB_STEP_SUMMARY
          echo "**Realm:** hr-manager" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Trigger backend-publish-prod.yml to deploy the API" >> $GITHUB_STEP_SUMMARY
          echo "2. Trigger frontend-deploy-prod.yml to deploy the Angular app" >> $GITHUB_STEP_SUMMARY
