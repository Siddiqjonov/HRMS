<nav class="nav-links">
  @for (item of navigationItems; track item.route) {
    <div class="nav-item-wrapper"
         (mouseenter)="onItemMouseEnter(item)"
         (mouseleave)="onItemMouseLeave()">
      <a [routerLink]="item.route" 
         [class.active]="isActive(item.route) || hasActiveChild(item)"
         [class.has-children]="hasChildren(item)"
         [class.expanded]="isItemExpanded(item)"
         (click)="hasChildren(item) ? onItemClick(item, $event) : onMenuItemClick()">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
        @if (hasChildren(item)) {
          <mat-icon class="dropdown-arrow" [class.rotated]="isItemExpanded(item)">arrow_drop_down</mat-icon>
        }
      </a>
      @if (hasChildren(item)) {
        <div class="dropdown-menu"
             [class.expanded]="isItemExpanded(item)"
             (mouseenter)="onItemMouseEnter(item)"
             (mouseleave)="onItemMouseLeave()">
          @for (child of item.children; track child.route) {
            <a [routerLink]="child.route"
               [class.active]="isActive(child.route)"
               (click)="onMenuItemClick()"
               class="dropdown-item">
              <mat-icon>{{ child.icon }}</mat-icon>
              <span>{{ child.label }}</span>
            </a>
          }
        </div>
      }
    </div>
  } @empty {
    <p>No navigation items available.</p>
  }
</nav>
