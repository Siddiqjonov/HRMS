<app-loading-spinner [loading]="isLoading"></app-loading-spinner>

@if(errorMessage) {
<app-error-display [message]="errorMessage"></app-error-display>
}

<div class="actions-and-table-wrapper">

  <div class="employee-managment">
    <h2>Employee Management <mat-icon>manage_accounts</mat-icon> </h2>
  </div>
  
  <button class="add-btn" mat-flat-button color="primary" (click)="onAddEmployee()">
    <mat-icon>person_add</mat-icon>
    Add Employee
  </button>

  @if (dataSource.data.length === 0 && !isLoading && !errorMessage) {
    <app-empty-state 
      message="No employees found" 
      icon="person_off"
      description="Start by adding your first employee using the button above.">
    </app-empty-state>
  } @else {
    <app-data-table 
      [dataSource]="dataSource" 
      [displayedColumns]="displayedColumns"
      [length]="paginationResult?.totalCount || 0" 
      [pageSize]="paginationResult?.pageSize || 10"
      [pageIndex]="(paginationResult?.page || 1) - 1" 
      [paginatorLabel]="'Employees'"
      (pageChange)="onPageChange($event)" 
      (edit)="onEditEmployee($event)"
      (delete)="onDeleteEmployee($event)"
      (view)="onViewEmployee($event)">
    </app-data-table>
  }

</div>
