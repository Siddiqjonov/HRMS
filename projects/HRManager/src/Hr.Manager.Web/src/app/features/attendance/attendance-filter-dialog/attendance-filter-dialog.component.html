<h2 mat-dialog-title>
  <mat-icon class="title-icon">filter_list</mat-icon>
  Attendance
</h2>

<mat-dialog-content>
  <div class="filter-container">
    <!-- Employee Selection -->
    @if (!hideEmployeeSelection) {
      <div class="filter-section">
        <mat-form-field>
          <mat-label>Select Employee</mat-label>
          <input 
            matInput 
            [readonly]="true"
            [value]="selectedEmployee ? selectedEmployee.fullName : ''"
            placeholder="Select Employee"
            (click)="onEmployeeInputClick($event)"
            (keydown)="onEmployeeInputKeydown($event)"
            class="selection-input">
          @if (selectedEmployee) {
            <button mat-icon-button matSuffix (click)="clearEmployee($event)" type="button" class="clear-btn">
              <mat-icon>close</mat-icon>
            </button>
          } @else {
            <mat-icon matSuffix class="selection-icon" (click)="onEmployeeInputClick($event)">person_search</mat-icon>
          }
        </mat-form-field>
      </div>
    }

    <!-- Start Date Filter -->
    <div class="filter-section">
      <mat-form-field appearance="outline">
        <mat-label>Start Date</mat-label>
        <input matInput [matDatepicker]="startPicker" [(ngModel)]="startDate">
        <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <!-- End Date Filter -->
    <div class="filter-section">
      <mat-form-field appearance="outline">
        <mat-label>End Date</mat-label>
        <input matInput [matDatepicker]="endPicker" [(ngModel)]="endDate">
        <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <!-- Arrival Status Filter -->
    <div class="filter-section">
      <mat-form-field appearance="outline">
        <mat-label>Arrival</mat-label>
        <mat-select [(ngModel)]="arrivalStatus">
          <mat-option value="all">All</mat-option>
          <mat-option value="onTime">On Time</mat-option>
          <mat-option value="late">Late</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Departure Status Filter -->
    <div class="filter-section">
      <mat-form-field appearance="outline">
        <mat-label>Departure</mat-label>
        <mat-select [(ngModel)]="departureStatus">
          <mat-option value="all">All</mat-option>
          <mat-option value="onTime">On Time</mat-option>
          <mat-option value="early">Early</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="center" class="dialog-actions">
  <button mat-button (click)="onClearAllFilters()" type="button" class="clear-all-btn">
    <mat-icon>clear_all</mat-icon>
    <span class="button-text-full">Clear All</span>
    <span class="button-text-short">Clear</span>
  </button>
  <button mat-button (click)="onCancel()" type="button">Cancel</button>
  <button mat-raised-button color="primary" (click)="onApplyFilters()" type="button" class="apply-btn">
    <mat-icon>search</mat-icon>
    <span class="button-text-full">Apply Filters</span>
    <span class="button-text-short">Apply</span>
  </button>
</mat-dialog-actions>
